services:
  forgejo:
    image: codeberg.org/forgejo/forgejo:14
    container_name: forgejo
    restart: unless-stopped
    environment:
      - USER_UID=1000
      - USER_GID=1000
    volumes:
      - /srv/forgejo/data:/data
      - /etc/localtime:/etc/localtime:ro
    ports:
      - "0.0.0.0:3300:3000"
      - "0.0.0.0:2222:22"
