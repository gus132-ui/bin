[Definition]
_daemon = sshd-session

# Match "journalctl -u ssh.service --output=short" style lines:
# "<ts> <host> sshd-session[PID]: <message>"
failregex =
  ^.*\bsshd-session\[\d+\]: (?:error: PAM: )?Authentication failure for .* from <HOST>(?: port \d+)? ssh2(?: \[preauth\])?$
  ^.*\bsshd-session\[\d+\]: Failed password for (?:invalid user )?\S+ from <HOST>(?: port \d+)? ssh2(?: \[preauth\])?$
  ^.*\bsshd-session\[\d+\]: Failed publickey for (?:invalid user )?\S+ from <HOST>(?: port \d+)? ssh2(?: \[preauth\])?$
  ^.*\bsshd-session\[\d+\]: Invalid user \S+ from <HOST>(?: port \d+)?(?: \[preauth\])?$
  ^.*\bsshd-session\[\d+\]: Connection closed by (?:invalid user )?\S* ?<HOST>(?: port \d+)?(?: \[preauth\])?$
  ^.*\bsshd-session\[\d+\]: Disconnected from (?:invalid user )?\S* ?<HOST>(?: port \d+)?(?: \[preauth\])?$
  ^.*\bsshd-session\[\d+\]: Unable to negotiate with <HOST>(?: port \d+)?: .*$
  ^.*\bsshd-session\[\d+\]: Received disconnect from <HOST>(?: port \d+)?: .*$

ignoreregex =

